<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f13"/>
      <stop offset="50%" stop-color="#1a1a23"/>
      <stop offset="100%" stop-color="#0f0f13"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d47f0"/>
      <stop offset="100%" stop-color="#9886fe"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="600" cy="280" r="200" fill="#5d47f0" opacity="0.06"/>
  <circle cx="400" cy="350" r="150" fill="#06B6D4" opacity="0.04"/>

  <!-- Logo text "growtify" -->
  <text x="600" y="280" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-4">growtify</text>

  <!-- Gradient dot -->
  <circle cx="905" cy="260" r="14" fill="url(#dot)"/>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="400" fill="#9090a0">Yapay zeka ile işini büyüten profesyonellerin platformu</text>

  <!-- GROWT Method badge -->
  <rect x="460" y="380" width="280" height="40" rx="20" fill="#5d47f0" opacity="0.15"/>
  <text x="600" y="406" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9886fe">GROWT Method™ ile 5 Seviyede Dönüşüm</text>

  <!-- Domain -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="500" fill="#4a4a5a">growtify.ai</text>
</svg>
